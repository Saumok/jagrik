# Cloud Run env vars. Copy this to gcp.env.yaml (gitignored), fill in your real
# values from .env, and pass it on deploy with: --env-vars-file gcp.env.yaml
# (Quote every value. FIREBASE_SERVICE_ACCOUNT_B64 is one long base64 line.)
GEMINI_API_KEY: "your-gemini-key"
GEMINI_MODEL: "gemini-2.5-flash"
GROQ_API_KEY: "your-groq-key"
GROQ_MODEL: "llama-3.3-70b-versatile"
ELEVENLABS_API_KEY: "your-elevenlabs-key"
RESEND_API_KEY: "your-resend-key"
RESEND_FROM: "Jagrik <onboarding@resend.dev>"
DEMO_INBOX: "you@example.com"
FIREBASE_SERVICE_ACCOUNT_B64: "paste-the-long-base64-string-here"
NODE_ENV: "production"
