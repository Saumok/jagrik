<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 360" width="1240" height="360" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf4ec"/><stop offset="1" stop-color="#efe1d2"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#241b12" flood-opacity="0.08"/>
    </filter>
  </defs>
    <rect width="1240" height="360" fill="url(#bg)"/>
    <text x="30" y="58" font-size="30" font-weight="700" fill="#241b12">From a photo to a fixed neighbourhood</text>
    <text x="30" y="92" font-size="17" fill="#6f6052">The citizen does the easy part. AI agents do everything else — and the loop closes publicly.</text>
    <g filter="url(#card)">
      <rect x="30" y="132" width="210" height="168" rx="20" fill="#ffffff" fill-opacity="0.72" stroke="#0f6e66" stroke-opacity="0.28"/></g>
      <circle cx="64" cy="168" r="18" fill="#0f6e66"/>
      <text x="64" y="174" font-size="19" font-weight="700" fill="#fff" text-anchor="middle">1</text>
      <text x="94" y="174" font-size="20" font-weight="700" fill="#241b12">Report it</text>
      <text x="52" y="218" font-size="14.5" fill="#6f6052">Snap a photo or</text>
      <text x="52" y="240" font-size="14.5" fill="#6f6052">speak in your language</text><path d="M244 216 l16 0 m-6 -6 l6 6 l-6 6" stroke="#9a8a79" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><g filter="url(#card)">
      <rect x="265" y="132" width="210" height="168" rx="20" fill="#ffffff" fill-opacity="0.72" stroke="#c9741f" stroke-opacity="0.28"/></g>
      <circle cx="299" cy="168" r="18" fill="#c9741f"/>
      <text x="299" y="174" font-size="19" font-weight="700" fill="#fff" text-anchor="middle">2</text>
      <text x="329" y="174" font-size="20" font-weight="700" fill="#241b12">AI agents act</text>
      <text x="287" y="218" font-size="14.5" fill="#6f6052">Classify · route · draft</text>
      <text x="287" y="240" font-size="14.5" fill="#6f6052">· file · follow-up</text><path d="M479 216 l16 0 m-6 -6 l6 6 l-6 6" stroke="#9a8a79" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><g filter="url(#card)">
      <rect x="500" y="132" width="210" height="168" rx="20" fill="#ffffff" fill-opacity="0.72" stroke="#0f6e66" stroke-opacity="0.28"/></g>
      <circle cx="534" cy="168" r="18" fill="#0f6e66"/>
      <text x="534" y="174" font-size="19" font-weight="700" fill="#fff" text-anchor="middle">3</text>
      <text x="564" y="174" font-size="20" font-weight="700" fill="#241b12">Filed for real</text>
      <text x="522" y="218" font-size="14.5" fill="#6f6052">PDF + email to the</text>
      <text x="522" y="240" font-size="14.5" fill="#6f6052">grievance cell + tracking ID</text><path d="M714 216 l16 0 m-6 -6 l6 6 l-6 6" stroke="#9a8a79" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><g filter="url(#card)">
      <rect x="735" y="132" width="210" height="168" rx="20" fill="#ffffff" fill-opacity="0.72" stroke="#1e9e6a" stroke-opacity="0.28"/></g>
      <circle cx="769" cy="168" r="18" fill="#1e9e6a"/>
      <text x="769" y="174" font-size="19" font-weight="700" fill="#fff" text-anchor="middle">4</text>
      <text x="799" y="174" font-size="20" font-weight="700" fill="#241b12">Verified fixed</text>
      <text x="757" y="218" font-size="14.5" fill="#6f6052">AI before/after check</text>
      <text x="757" y="240" font-size="14.5" fill="#6f6052">flips it to Resolved</text><path d="M949 216 l16 0 m-6 -6 l6 6 l-6 6" stroke="#9a8a79" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><g filter="url(#card)">
      <rect x="970" y="132" width="210" height="168" rx="20" fill="#ffffff" fill-opacity="0.72" stroke="#c9741f" stroke-opacity="0.28"/></g>
      <circle cx="1004" cy="168" r="18" fill="#c9741f"/>
      <text x="1004" y="174" font-size="19" font-weight="700" fill="#fff" text-anchor="middle">5</text>
      <text x="1034" y="174" font-size="20" font-weight="700" fill="#241b12">Rewarded</text>
      <text x="992" y="218" font-size="14.5" fill="#6f6052">Civic Score, badges,</text>
      <text x="992" y="240" font-size="14.5" fill="#6f6052">community celebrates</text></svg>