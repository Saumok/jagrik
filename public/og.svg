<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf4ec"/>
      <stop offset="1" stop-color="#efe1d2"/>
    </linearGradient>
    <radialGradient id="teal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0f6e66" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#0f6e66" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gold" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e8923c" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#e8923c" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#241b12" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="140" cy="90" r="360" fill="url(#teal)"/>
  <circle cx="1120" cy="600" r="420" fill="url(#gold)"/>

  <!-- brand -->
  <g transform="translate(80,72)">
    <path d="M22 0C12 0 4.6 7.2 4.6 16.6 4.6 27.8 18 42 20.4 44.2c.6.5 1.6.5 2.2 0C25 42 38.4 27.8 38.4 16.6 38.4 7.2 31 0 22 0Z" fill="#0f6e66"/>
    <circle cx="22" cy="16.8" r="9.1" fill="#faf4ec"/>
    <circle cx="22" cy="16.8" r="3.9" fill="#0a4f49"/>
    <text x="56" y="34" font-size="34" font-weight="700" fill="#241b12" letter-spacing="-0.5">Jagrik</text>
  </g>

  <!-- headline -->
  <text x="80" y="232" font-size="92" font-weight="700" fill="#241b12" letter-spacing="-2">See it. Say it.</text>
  <text x="80" y="330" font-size="92" font-weight="700" fill="#0f6e66" letter-spacing="-2">Solved.</text>

  <text x="82" y="392" font-size="29" fill="#6f6052">AI agents turn a photo — or a spoken sentence — into a filed,</text>
  <text x="82" y="430" font-size="29" fill="#6f6052">tracked, and AI-verified civic complaint.</text>

  <!-- feature pills -->
  <g font-size="22" font-weight="600">
    <g transform="translate(80,470)">
      <rect width="252" height="50" rx="25" fill="#ffffff" fill-opacity="0.6" stroke="#0f6e66" stroke-opacity="0.25"/>
      <circle cx="30" cy="25" r="5" fill="#0f6e66"/>
      <text x="48" y="33" fill="#2a2018">Multi-agent pipeline</text>
    </g>
    <g transform="translate(348,470)">
      <rect width="288" height="50" rx="25" fill="#ffffff" fill-opacity="0.6" stroke="#0f6e66" stroke-opacity="0.25"/>
      <circle cx="30" cy="25" r="5" fill="#e8923c"/>
      <text x="48" y="33" fill="#2a2018">Voice in your language</text>
    </g>
    <g transform="translate(652,470)">
      <rect width="300" height="50" rx="25" fill="#ffffff" fill-opacity="0.6" stroke="#0f6e66" stroke-opacity="0.25"/>
      <circle cx="30" cy="25" r="5" fill="#1e9e6a"/>
      <text x="48" y="33" fill="#2a2018">AI before/after proof</text>
    </g>
  </g>

  <text x="80" y="582" font-size="21" font-weight="600" fill="#9a8a79" letter-spacing="1.5">VIBE2SHIP · PROBLEM STATEMENT 2 · COMMUNITY HERO</text>

  <!-- war-room glass card -->
  <g transform="translate(852,150)" filter="url(#soft)">
    <rect width="268" height="330" rx="26" fill="#ffffff" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.8"/>
    <text x="26" y="44" font-size="14" font-weight="700" fill="#9a8a79" letter-spacing="2">AGENT WAR-ROOM</text>
    <!-- steps -->
    <g font-size="17" font-weight="600" fill="#2a2018">
      <g transform="translate(26,70)">
        <circle cx="11" cy="11" r="11" fill="#1e9e6a"/>
        <path d="M6 11l3.5 3.5L16 7.5" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="34" y="16">Classified · pothole</text>
      </g>
      <g transform="translate(26,116)">
        <circle cx="11" cy="11" r="11" fill="#1e9e6a"/>
        <path d="M6 11l3.5 3.5L16 7.5" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="34" y="16">Routed · KMC Roads</text>
      </g>
      <g transform="translate(26,162)">
        <circle cx="11" cy="11" r="11" fill="#1e9e6a"/>
        <path d="M6 11l3.5 3.5L16 7.5" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="34" y="16">Drafted complaint</text>
      </g>
      <g transform="translate(26,208)">
        <circle cx="11" cy="11" r="11" fill="#1e9e6a"/>
        <path d="M6 11l3.5 3.5L16 7.5" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="34" y="16">Emailed + PDF filed</text>
      </g>
      <g transform="translate(26,254)">
        <circle cx="11" cy="11" r="11" fill="#e8923c"/>
        <text x="34" y="16" fill="#6f6052">Follow-up scheduled…</text>
      </g>
    </g>
    <rect x="26" y="292" width="216" height="20" rx="10" fill="#0f6e66" fill-opacity="0.12"/>
    <text x="36" y="307" font-size="13" font-weight="700" fill="#0a4f49">TRK-KMC-RD-4821 · tracked</text>
  </g>
</svg>
